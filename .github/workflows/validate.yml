name: validate

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

concurrency:
  group: build-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  install-lint-test:
    strategy:
      # Let each platform report its true status: one platform's failure
      # must not cancel the others.
      fail-fast: false
      matrix:
        # macos-26: current GA arm64 image, ships Xcode 26 (required for the
        # iOS deployment target 26 SDK; macos-latest still maps to macOS 15).
        # ubuntu-latest = 24.04: ubuntu-26.04 is still a preview image —
        # revisit when GA.
        os: [macos-26, ubuntu-latest, linux-arm64-runner]
        # The standalone-package check (each package built in its own tree)
        # validates packaging structure, which is host-independent — the
        # macOS leg runs it, the Linux legs build only the root tree and
        # lint against its compile database (MODERNIZATION.md "After the
        # consolidation: CI speed", item 1).
        include:
          - os: macos-26
            install_extra: ""
          - os: ubuntu-latest
            install_extra: "--no-standalone"
          - os: linux-arm64-runner
            install_extra: "--no-standalone"
    runs-on: ${{ matrix.os }}
    env:
      INSTALL_EXTRA_FLAGS: ${{ matrix.install_extra }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: install
        uses: ./.github/workflows/reusable/cached-install
      - name: check proto sync with pinned TS reference
        run:
          ./check-proto-sync.sh
        shell: bash
      - name: lint
        run:
          ./lint.sh
        shell: bash
      - name: test
        run:
          ./test.sh
        shell: bash
