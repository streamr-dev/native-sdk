name: "cached install"
description: "install dependencies, build and cache result, or restore from cache if present"

runs:
  using: "composite"
  steps:
    - name: cache homedir
      id: cache-homedir
      uses: actions/cache/restore@v4
      with:
        key: ${{ runner.arch }}-${{ runner.os }}-cache-homedir2-${{ hashFiles('./vcpkg.json') }}
        path: |
          ~/.cache/vcpkg/archives
    - name: cache vcpkg installed
      id: cache-vcpkg-installed
      uses: actions/cache/restore@v4
      with:
        key: ${{ runner.arch }}-${{ runner.os }}-cache-vcpkg-installed2-${{ hashFiles('./vcpkg.json') }}
        path: |
          ./build/vcpkg_installed
    - name: install-prerequisities
      run:
        source install-prerequisities.sh
      shell: bash
    - name: install
      run: |
        ./install.sh --prod ${ARCHFLAGS:-} || {
          # Surface the most recent vcpkg buildtree logs as error
          # annotations so failures are diagnosable from the Checks UI
          # (raw step logs require authenticated access).
          echo "::error title=install failed::see the vcpkg buildtree log annotations"
          # Prefer recent logs that actually contain error text.
          LOGS=$(ls -t vcpkg/buildtrees/*/*.log 2>/dev/null | head -16)
          ERRLOGS=$(echo "$LOGS" | xargs grep -liE "(^|[^a-z])error[: ]" 2>/dev/null | head -3)
          [ -z "$ERRLOGS" ] && ERRLOGS=$(echo "$LOGS" | head -3)
          for log in $ERRLOGS; do
            echo "::group::${log}"
            tail -120 "$log"
            echo "::endgroup::"
            MSG=$(grep -B3 -A8 -iE "(^|[^a-z])error[: ]" "$log" | tail -30 | sed 's/%/%25/g' | awk '{printf "%s%%0A", $0}')
            [ -z "$MSG" ] && MSG=$(tail -25 "$log" | sed 's/%/%25/g' | awk '{printf "%s%%0A", $0}')
            echo "::error title=${log}::${MSG}"
          done
          exit 1
        }
      shell: bash
    - name: cache homedir save
      id: cache-homedir-save
      if: always()
      uses: actions/cache/save@v4
      with:
        key: ${{ runner.arch }}-${{ runner.os }}-cache-homedir2-${{ hashFiles('./vcpkg.json') }}
        path: |
          ~/.cache/vcpkg/archives
    - name: cache vcpkg installed save
      id: cache-vcpkg-installed-save
      if: always()
      uses: actions/cache/save@v4
      with:
        key: ${{ runner.arch }}-${{ runner.os }}-cache-vcpkg-installed2-${{ hashFiles('./vcpkg.json') }}
        path: |
          ./build/vcpkg_installed
