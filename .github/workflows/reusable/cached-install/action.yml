name: "cached install"
description: "install dependencies, build and cache result, or restore from cache if present"

runs:
  using: "composite"
  steps:
    # The v2 generation suffix in the key names: the first arm64-ios
    # entry saved under the v1 keys restored CORRUPTLY on every later run
    # (boost headers came back empty — "use of undeclared identifier
    # 'boost'" in Uuid.cppm while the same file/flags/SDK compile cleanly
    # elsewhere; actions/cache treats a partial extraction as a warning,
    # not an error). Cache entries are immutable under their key, so a
    # poisoned entry can only be retired by bumping the generation.
    #
    # The cache keys must distinguish the TARGET platform, not just the
    # runner: the macOS host build, the iOS build and the Android build
    # all run on the same macos runner image, and GitHub's cache is
    # write-once per key — with a shared key the first job to save owns
    # the cache forever and the other platforms' saves fail ("Cache save
    # failed."), so their dependencies were rebuilt from source on every
    # run (~30 min Android, ~35 min iOS). ARCHFLAGS is the workflow-level
    # platform selector (empty = host, --ios, --android). The vcpkg
    # submodule commit is part of the key because the tool version
    # changes what it builds; the restore-keys prefix fallback reuses the
    # newest previous cache on any key miss — vcpkg's own per-package ABI
    # hashing makes stale archive entries harmless (they are ignored) and
    # `vcpkg install` reconciles a stale installed tree.
    - name: compute cache keys
      id: keys
      run: |
        echo "platform=${ARCHFLAGS:-host}" >> "$GITHUB_OUTPUT"
        echo "vcpkg_sha=$(git rev-parse HEAD:vcpkg)" >> "$GITHUB_OUTPUT"
      shell: bash
    - name: cache vcpkg binary archives
      id: cache-homedir
      uses: actions/cache/restore@v4
      with:
        key: ${{ runner.arch }}-${{ runner.os }}-${{ steps.keys.outputs.platform }}-archives-v2-${{ steps.keys.outputs.vcpkg_sha }}-${{ hashFiles('./vcpkg.json', './overlaytriplets/**', './overlayports/**') }}
        restore-keys: |
          ${{ runner.arch }}-${{ runner.os }}-${{ steps.keys.outputs.platform }}-archives-v2-${{ steps.keys.outputs.vcpkg_sha }}-
          ${{ runner.arch }}-${{ runner.os }}-${{ steps.keys.outputs.platform }}-archives-v2-
        path: |
          ~/.cache/vcpkg/archives
    - name: cache vcpkg installed
      id: cache-vcpkg-installed
      uses: actions/cache/restore@v4
      with:
        key: ${{ runner.arch }}-${{ runner.os }}-${{ steps.keys.outputs.platform }}-installed-v2-${{ steps.keys.outputs.vcpkg_sha }}-${{ hashFiles('./vcpkg.json', './overlaytriplets/**', './overlayports/**') }}
        restore-keys: |
          ${{ runner.arch }}-${{ runner.os }}-${{ steps.keys.outputs.platform }}-installed-v2-${{ steps.keys.outputs.vcpkg_sha }}-
          ${{ runner.arch }}-${{ runner.os }}-${{ steps.keys.outputs.platform }}-installed-v2-
        path: |
          ./build/vcpkg_installed
    # Ninja decides what to rebuild by comparing source mtimes against the
    # state recorded in the cached build tree. A fresh checkout stamps every
    # file with the checkout time, which would force a full rebuild — so
    # reset every tracked file's mtime to its last-change commit time (the
    # same rule the run that SAVED the cache used; requires the workflows'
    # fetch-depth: 0). Single pass over git log, a few seconds.
    - name: restore source mtimes
      run: |
        python3 - <<'PYEOF'
        import subprocess, os
        tracked = set(subprocess.run(['git','ls-files'], capture_output=True, text=True).stdout.splitlines())
        log = subprocess.run(['git','log','--format=%ct','--name-only','--no-renames'], capture_output=True, text=True).stdout
        seen, t = set(), None
        for line in log.splitlines():
            if not line:
                continue
            if line not in tracked and line.isdigit():
                t = int(line)
                continue
            if line in tracked and line not in seen:
                seen.add(line)
                try:
                    os.utime(line, (t, t))
                except FileNotFoundError:
                    pass
            if len(seen) == len(tracked):
                break
        print(f"restored mtimes for {len(seen)}/{len(tracked)} tracked files")
        PYEOF
      shell: bash
    # Build-tree cache (MODERNIZATION.md "After the consolidation: CI
    # speed", item 2): restore the previous ROOT build tree so Ninja
    # recompiles only what the pull request touched. vcpkg_installed is
    # excluded (it has its own cache above); the per-package standalone
    # trees are NOT cached — at ~8 x 0.5-1.5 GB they would blow the shared
    # 10 GB actions-cache budget (the macOS leg rebuilds them as the
    # packaging check; the Linux legs skip them via --no-standalone).
    # Saved from main-branch runs only, so entries rotate once per merge
    # instead of once per push, and a broken PR tree can never poison the
    # cache (lesson from the corrupted arm64-ios dependency cache).
    # v2 generation: `import std` requires CMAKE_CXX_MODULE_STD to be set
    # before project()/CXX detection, and CMake freezes that detection into
    # the build tree's CMakeCache. A v1 tree cached before import std cannot
    # be reconfigured into an import-std build ("__CMAKE::CXX26 ... not
    # provided by the toolchain; must be set before CXX is enabled"), so the
    # generation is bumped to force a clean configure. Post-merge, v2 trees
    # are import-std-configured and incremental caching resumes.
    - name: cache build tree
      id: cache-buildtree
      uses: actions/cache/restore@v4
      with:
        key: ${{ runner.arch }}-${{ runner.os }}-${{ steps.keys.outputs.platform }}-buildtree-v2-${{ steps.keys.outputs.vcpkg_sha }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.arch }}-${{ runner.os }}-${{ steps.keys.outputs.platform }}-buildtree-v2-${{ steps.keys.outputs.vcpkg_sha }}-
          ${{ runner.arch }}-${{ runner.os }}-${{ steps.keys.outputs.platform }}-buildtree-v2-
        path: |
          ./build
          !./build/vcpkg_installed
    - name: install-prerequisities
      run:
        source install-prerequisities.sh
      shell: bash
    - name: install
      run: |
        # Composite steps run under bash -e -o pipefail: disarm around the
        # pipeline or a failure aborts the script before we can annotate.
        set +e +o pipefail
        ./install.sh --prod ${ARCHFLAGS:-} ${INSTALL_EXTRA_FLAGS:-} 2>&1 | tee install-output.log
        EXITCODE=${PIPESTATUS[0]}
        if [ "$EXITCODE" -ne 0 ]; then
          # Surface failure context as error annotations so failures are
          # diagnosable from the Checks UI (raw step logs need auth).
          set +e
          MSG=$(tail -40 install-output.log | sed 's/%/%25/g' | awk '{printf "%s%%0A", $0}')
          echo "::error title=install.sh output tail::${MSG}"
          # GitHub caps one annotation at 4096 characters, and a single
          # module-compile command line can eat that alone — emit a second
          # annotation with just the compiler error lines and their context
          # so failures stay diagnosable from the Checks UI.
          ERRMSG=$(grep -A 10 -E '(^|[^a-zA-Z])error:' install-output.log | tail -55 | cut -c1-260 | sed 's/%/%25/g' | awk '{printf "%s%%0A", $0}')
          [ -n "$ERRMSG" ] && echo "::error title=compiler errors (context)::${ERRMSG}"
          for log in $(ls -t vcpkg/buildtrees/*/*.log 2>/dev/null | head -16 | xargs grep -liE "(^|[^a-z])error[: ]" 2>/dev/null | head -3); do
            echo "::group::${log}"
            tail -120 "$log"
            echo "::endgroup::"
            MSG=$(grep -B3 -A8 -iE "(^|[^a-z])error[: ]" "$log" | tail -30 | sed 's/%/%25/g' | awk '{printf "%s%%0A", $0}')
            [ -n "$MSG" ] && echo "::error title=${log}::${MSG}"
          done
          exit "$EXITCODE"
        fi
      shell: bash
    # Save even on failure (if: always()) so a partially built dependency
    # set is reused by the retry. Saving is skipped when the exact key was
    # already restored (nothing new to store).
    - name: cache vcpkg binary archives save
      id: cache-homedir-save
      if: always() && steps.cache-homedir.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        key: ${{ runner.arch }}-${{ runner.os }}-${{ steps.keys.outputs.platform }}-archives-v2-${{ steps.keys.outputs.vcpkg_sha }}-${{ hashFiles('./vcpkg.json', './overlaytriplets/**', './overlayports/**') }}
        path: |
          ~/.cache/vcpkg/archives
    - name: cache vcpkg installed save
      id: cache-vcpkg-installed-save
      if: always() && steps.cache-vcpkg-installed.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        key: ${{ runner.arch }}-${{ runner.os }}-${{ steps.keys.outputs.platform }}-installed-v2-${{ steps.keys.outputs.vcpkg_sha }}-${{ hashFiles('./vcpkg.json', './overlaytriplets/**', './overlayports/**') }}
        path: |
          ./build/vcpkg_installed
    - name: cache build tree save
      id: cache-buildtree-save
      # Success-only and main-only: PR runs consume, merge runs publish.
      if: github.ref == 'refs/heads/main' && steps.cache-buildtree.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        key: ${{ runner.arch }}-${{ runner.os }}-${{ steps.keys.outputs.platform }}-buildtree-v2-${{ steps.keys.outputs.vcpkg_sha }}-${{ github.sha }}
        path: |
          ./build
          !./build/vcpkg_installed
